<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给最特别的你</title>
    <style>
        /* 音乐控制按钮样式 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #ff69b4;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 3s linear infinite;
            animation-play-state: paused;
        }

        .music-btn.playing {
            animation-play-state: running;
            background: rgba(255, 105, 180, 0.5);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 鼠标跟随爱心特效 */
        .cursor-heart {
            position: fixed;
            pointer-events: none;
            color: #ff69b4;
            font-size: 20px;
            animation: floatUp 1s linear forwards;
            z-index: 9999;
            text-shadow: 0 0 5px rgba(255, 105, 180, 0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* 背景漂浮爱心 */
        .floating-heart {
            position: fixed;
            color: rgba(255, 105, 180, 0.3);
            animation: float 15s linear infinite;
            z-index: 1;
            pointer-events: none;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; /* 让鼠标穿透到 canvas */
        }
        
        h1 {
            font-size: 3rem;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff1493;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        
        .timer {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #ddd;
            text-shadow: 0 0 5px #fff;
        }
        
        .btn-gift {
            pointer-events: auto; /* 恢复按钮点击 */
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff1493;
            transition: transform 0.3s, box-shadow 0.3s;
            outline: none;
        }
        
        .btn-gift:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #ff1493;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #2b1055, #7597de);
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            animation: zoomIn 0.5s;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 抽奖模式样式 */
        .lottery-box {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            width: 200px;
            height: 120px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            border: 4px solid #ff69b4;
            transition: transform 0.1s;
        }

        .lottery-box h3 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: #ff1493;
        }

        .lottery-box p {
            font-size: 1rem;
            color: #666;
            margin: 0;
        }

        .btn-draw {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .btn-draw:active {
            transform: scale(0.95);
        }

        .btn-draw:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .my-prizes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .prize-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ff1493;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 20px #ff1493; transform: scale(1); }
            50% { text-shadow: 0 0 40px #ff1493; transform: scale(1.05); }
            100% { text-shadow: 0 0 20px #ff1493; transform: scale(1); }
        }

        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="greeting" style="min-height: 1.5em; border-right: 2px solid #ff69b4; display: inline-block; padding-right: 5px; animation: blink 0.7s infinite;"></h1>
        <div class="timer" id="timer">我们已经相爱了: 计算中...</div>
        <button class="btn-gift" onclick="openGift()">领取礼物 🎁</button>
    </div>

    <!-- 模态框 -->
    <div id="giftModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGift()">&times;</span>
            <h2>🎁 你的专属抽奖机</h2>
            <p>点击按钮抽取你的生日特权！</p>
            
            <!-- 抽奖展示区 -->
            <div class="lottery-box" id="lotteryBox">
                <h3>❓</h3>
                <p>准备好了吗？</p>
            </div>

            <button class="btn-draw" id="drawBtn" onclick="startLottery()">开始抽奖 ✨</button>

            <!-- 结果展示区 -->
             <div style="color: #fff; margin-top: 10px; font-size: 0.9rem;">已获得的奖励：</div>
            <div class="my-prizes" id="myPrizes">
                <!-- 奖品会在这里出现 -->
            </div>
        </div>
    </div>

    <canvas id="heart"></canvas>
    
    <!-- 背景音乐 -->
    <audio id="bgm" loop>
        <!-- 默认使用生日快乐歌，如果链接失效，请替换为你自己的mp3文件或在线链接 -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- 音乐控制按钮 -->
    <button id="musicBtn" class="music-btn">🎵</button>

    <!-- 技能栏 -->
    <div class="skills-bar">
        <button class="skill-btn" onclick="toggleAutoLock()" id="autoLockBtn">🎯 自动锁定 (30s)</button>
        <button class="skill-btn" onclick="launchHeartShape()" id="heartShapeBtn">💖 烟花爱心</button>
        <button class="skill-btn" onclick="gatherStarsToHeart()" id="starHeartBtn">⭐ 星星聚爱</button>
    </div>

    <style>
        .skills-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .skill-btn {
            background: rgba(255, 105, 180, 0.3);
            border: 2px solid #ff69b4;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .skill-btn:hover {
            background: rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff1493;
        }

        .skill-btn.active {
            background: #ff1493;
            box-shadow: 0 0 20px #ff69b4;
            animation: pulse-btn 1s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>

    <!-- 惊喜弹窗 -->
    <div id="surpriseOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; justify-content:center; align-items:center; flex-direction:column; background:rgba(0,0,0,0.7); pointer-events:none;">
        <h1 id="surpriseText" style="color:#ff69b4; font-size:5rem; text-shadow: 0 0 20px white; animation: pulse 1s infinite; text-align:center;"></h1>
    </div>

    <script>
        // 定义动画
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);

        // ================= 互动特效逻辑 =================
        // 1. 鼠标跟随/点击绽放爱心
        const hearts = ['❤️', '💖', '💕', '💗', '💓', '🌸', '✨'];
        
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'cursor-heart';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = (x - 10) + 'px'; // 中心校准
            heart.style.top = (y - 10) + 'px';
            // 随机大小和旋转
            const size = Math.random() * 20 + 10;
            heart.style.fontSize = size + 'px';
            heart.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 1000);
        }

        document.addEventListener('mousemove', function(e) {
            // 限制生成频率，避免太乱
            if (Math.random() < 0.1) {
                createHeart(e.clientX, e.clientY);
            }
        });

        document.addEventListener('click', function(e) {
            // 点击时爆出多个爱心
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    createHeart(e.clientX + (Math.random() - 0.5) * 50, e.clientY + (Math.random() - 0.5) * 50);
                }, i * 50);
            }
        });

        // 2. 背景漂浮爱心生成器
         // 增加情话弹幕
         const loveWords = [
             "宝贝", "想你", "爱你", "永远", "我的", "抱抱", "亲亲", 
             "My Love", "Sweet", "Only You", "Crush", "Honey", 
             "遇见你真好", "余生都是你", "每天多爱一点", "你最珍贵", "心动",
             "阿宝宝", "口水猫", "最美小仙女", "胖胖永远爱你❤"
         ];

         setInterval(() => {
             const heart = document.createElement('div');
             heart.className = 'floating-heart';
             
             // 随机决定是爱心还是文字
             if (Math.random() < 0.3) { // 30%概率出现文字
                 heart.innerText = loveWords[Math.floor(Math.random() * loveWords.length)];
                 heart.style.fontSize = (Math.random() * 10 + 14) + 'px'; // 文字稍微小一点
                 heart.style.color = `rgba(255, ${Math.floor(Math.random() * 155 + 100)}, ${Math.floor(Math.random() * 155 + 100)}, 0.6)`; // 随机粉色系
                 heart.style.fontFamily = "'Microsoft YaHei', cursive";
                 heart.style.fontWeight = "bold";
             } else {
                 heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                 heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                 heart.style.color = "rgba(255, 105, 180, 0.3)";
             }
             
             heart.style.left = Math.random() * 100 + 'vw';
             heart.style.animationDuration = (Math.random() * 10 + 10) + 's'; // 10-20s
             heart.style.opacity = Math.random() * 0.5 + 0.2;
             document.body.appendChild(heart);
             
             // 动画结束后移除
             setTimeout(() => heart.remove(), 20000);
         }, 800);

        // ================= 配置区域 =================
        const START_DATE = "2020-10-03"; // 在这里修改你们的纪念日 (格式: YYYY-MM-DD)
        const GREETING_TEXT = "亲爱的燕君娃，生日快乐 & 女神节快乐！";
        // 音乐文件配置
        // 优先使用同目录下的 "birthday.mp4" (即使是视频文件，audio标签也能播放声音)
        const MUSIC_URL = "birthday.mp4"; 

        const bgm = document.getElementById('bgm');
        bgm.src = MUSIC_URL;
        
        // 音乐自动播放处理
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic(e) {
            if (e) e.stopPropagation(); // 阻止事件冒泡，防止触发 body 的点击播放
            
            if (bgm.paused) {
                bgm.play().then(() => {
                    musicBtn.classList.add('playing');
                    musicBtn.innerText = "🎵";
                }).catch(err => {
                    console.log("播放失败:", err);
                    // 某些浏览器可能需要更明确的用户交互
                });
            } else {
                bgm.pause();
                musicBtn.classList.remove('playing');
                musicBtn.innerText = "🔇";
            }
        }

        musicBtn.addEventListener('click', toggleMusic);

        // 尝试自动播放（现代浏览器通常会阻止，所以通常需要用户点击一次）
        document.body.addEventListener('click', function() {
            if (bgm.paused) {
                toggleMusic();
            }
        }, { once: true });
        
        // 奖品池配置
        const PRIZE_POOL = [
            { name: "💆‍♀️ 按摩券", desc: "随时兑换 30分钟" },
            { name: "🍽️ 洗碗券", desc: "但我还是想和你一起洗" },
            { name: "🛍️ 清空购物车", desc: "限额 380元 (穷)" },
            { name: "❤️ 原谅券", desc: "无理由原谅一次" },
            { name: "🥤 奶茶券", desc: "随时点，我买单" },
            { name: "🎬 电影券", desc: "挑你喜欢的看" },
            { name: "🛌 赖床券", desc: "周末多睡两小时" },
            { name: "👑 女王券", desc: "听你的，你说啥是啥" }
        ];
        // ===========================================

        // 打字机效果逻辑
        function typeWriter(text, elementId, speed = 150) {
            const element = document.getElementById(elementId);
            element.innerText = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    // 打字结束后移除光标闪烁效果
                    element.style.borderRight = "none";
                    element.style.animation = "none";
                }
            }
            type();
        }

        // 启动打字机
        typeWriter(GREETING_TEXT, 'greeting');

        // 倒计时逻辑
        function updateTimer() {
            const start = new Date(START_DATE);
            const now = new Date();
            const diff = now - start;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = `我们已经相爱了: ${days}天 ${hours}小时 ${minutes}分 ${seconds}秒`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 模态框逻辑
        function openGift() {
            document.getElementById('giftModal').style.display = "flex";
        }

        function closeGift() {
            document.getElementById('giftModal').style.display = "none";
        }

        // 抽奖逻辑
        let isDrawing = false;
        let availablePrizes = [...PRIZE_POOL]; // 复制一份奖品池
        
        function startLottery() {
            if (isDrawing) return;
            if (availablePrizes.length === 0) {
                alert("贪心的小猪，奖池已经抽空啦！全部归你！💖");
                return;
            }

            isDrawing = true;
            const box = document.getElementById('lotteryBox');
            const h3 = box.querySelector('h3');
            const p = box.querySelector('p');
            const btn = document.getElementById('drawBtn');
            
            btn.disabled = true;
            btn.innerText = "抽奖中...";

            // 动画效果：快速切换显示
            let count = 0;
            const maxCount = 20; // 闪动次数
            const interval = setInterval(() => {
                const randomPrize = availablePrizes[Math.floor(Math.random() * availablePrizes.length)];
                h3.innerText = randomPrize.name;
                p.innerText = randomPrize.desc;
                
                // 简单的缩放动画
                box.style.transform = count % 2 === 0 ? "scale(1.05)" : "scale(1)";
                
                count++;
                if (count >= maxCount) {
                    clearInterval(interval);
                    finalizeLottery();
                }
            }, 100);
        }

        function finalizeLottery() {
            // 最终中奖逻辑：随机抽取一个
            const winnerIndex = Math.floor(Math.random() * availablePrizes.length);
            const winner = availablePrizes[winnerIndex];
            
            // 从奖池移除（避免重复抽到）
            availablePrizes.splice(winnerIndex, 1);

            const box = document.getElementById('lotteryBox');
            box.style.transform = "scale(1)";
            
            // 显示结果
            box.querySelector('h3').innerText = "🎉 " + winner.name;
            box.querySelector('p').innerText = winner.desc;

            // 添加到我的奖品区
            const prizeEl = document.createElement('div');
            prizeEl.className = 'prize-item';
            prizeEl.innerText = winner.name;
            document.getElementById('myPrizes').appendChild(prizeEl);

            // 恢复按钮
            isDrawing = false;
            const btn = document.getElementById('drawBtn');
            btn.disabled = false;
            
            if (availablePrizes.length === 0) {
                btn.innerText = "奖池已空 (完美收官)";
            } else {
                btn.innerText = "再抽一次 ✨";
            }
        }

        // 粒子爱心逻辑 (保持原样)
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        class Particle {
            constructor() { this.init(); }
            init() {
                let t = Math.random() * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const scale = Math.min(width, height) / 35; 
                this.targetX = x * scale + width / 2;
                this.targetY = y * scale + height / 2;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0; this.vy = 0;
                this.friction = 0.95; this.spring = 0.03;
                this.size = Math.random() * 2 + 1;
                this.color = "#ff69b4";
            }
            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.vx += dx * this.spring;
                this.vy += dy * this.spring;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 800; i++) particles.push(new Particle());
        
        // ================= 烟花特效逻辑 =================
        class Spark {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                // 如果传入了vx,vy则直接使用，否则随机生成
                if (vx !== undefined && vy !== undefined) {
                    this.vx = vx;
                    this.vy = vy;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                }
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.gravity = 0.05;
            }
            update() {
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Firework {
            constructor(tx, ty, type = 'normal', isInstant = false) {
                this.type = type;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.sparks = [];
                this.exploded = false;
                this.isInstant = isInstant;

                if (isInstant) {
                    // 直接在目标位置爆炸
                    this.x = tx;
                    this.y = ty;
                    this.exploded = true;
                    this.createSparks();
                } else {
                    // 从底部发射
                    this.x = width / 2;
                    this.y = height;
                    this.tx = tx;
                    this.ty = ty;
                    const angle = Math.atan2(ty - this.y, tx - this.x);
                    this.vx = Math.cos(angle) * 12;
                    this.vy = Math.sin(angle) * 12;
                    this.distanceToTarget = Math.hypot(tx - this.x, ty - this.y);
                    this.distanceTraveled = 0;
                }
            }
            
            // 抽离爆炸逻辑
            createSparks() {
                if (this.type === 'heart') {
                    // 爱心形状爆炸
                    const particleCount = 60;
                    const scale = 0.15; // 速度缩放因子
                    for (let i = 0; i < particleCount; i++) {
                        const t = (Math.PI * 2 * i) / particleCount;
                        const dx = 16 * Math.pow(Math.sin(t), 3);
                        const dy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                        this.sparks.push(new Spark(this.x, this.y, this.color, dx * scale, dy * scale));
                    }
                } else {
                    // 普通圆形爆炸
                    for (let i = 0; i < 60; i++) {
                        this.sparks.push(new Spark(this.x, this.y, this.color));
                    }
                }
            }
            
            // 触发爆炸
            explode() {
                this.exploded = true;
                this.createSparks();
                
                // 烟花爆炸范围伤害：清除附近的掉落物并加分
                const blastRadius = 80; // 爆炸波及半径
                for (let i = fallingItems.length - 1; i >= 0; i--) {
                    const item = fallingItems[i];
                    const dx = this.x - item.x;
                    const dy = this.y - item.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < blastRadius) {
                        fallingItems.splice(i, 1);
                        addScore(1);
                        
                        // 击中特效：简单的分数跳动
                        scoreEl.style.transform = "scale(1.3)";
                        setTimeout(() => scoreEl.style.transform = "scale(1)", 150);
                    }
                }
            }
            
            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    const dist = Math.hypot(this.vx, this.vy);
                    this.distanceTraveled += dist;
                    
                    if (this.distanceTraveled >= this.distanceToTarget) {
                        this.explode();
                    }
                } else {
                    for (let i = this.sparks.length - 1; i >= 0; i--) {
                        this.sparks[i].update();
                        if (this.sparks[i].alpha <= 0) {
                            this.sparks.splice(i, 1);
                        }
                    }
                }
            }
            
            draw() {
                if (!this.exploded) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    this.sparks.forEach(s => s.draw());
                }
            }
            
            isDead() {
                return this.exploded && this.sparks.length === 0;
            }
        }

        // ================= 游戏模式：掉落烟花 =================
        let fireworks = [];
        let fallingItems = [];
        let score = 0;
        
        // 集中管理分数
        function addScore(points) {
            const oldScore = score;
            score += points;
            scoreEl.innerText = `击中烟花: ${score}`;
            
            // 惊喜检查
            if (oldScore < 520 && score >= 520) {
                triggerSurprise("520", "💖 我爱你 💖");
            } else if (oldScore < 1314 && score >= 1314) {
                triggerSurprise("1314", "🌹 一生一世 🌹");
            }
        }
        
        function triggerSurprise(type, text) {
            const overlay = document.getElementById('surpriseOverlay');
            const h1 = document.getElementById('surpriseText');
            
            overlay.style.display = 'flex';
            h1.innerHTML = text;
            
            // 播放特效
            if (type === "520") {
                // 520特效：爱心盛宴
                for(let i=0; i<3; i++) {
                    setTimeout(launchHeartShape, i*800);
                }
            } else if (type === "1314") {
                // 1314特效：超级连击
                const timer = setInterval(() => {
                    fireworks.push(new Firework(Math.random()*width, Math.random()*height * 0.5));
                }, 100);
                setTimeout(() => clearInterval(timer), 5000); // 持续5秒狂轰滥炸
                launchHeartShape();
            }
            
            // 3秒后隐藏文字
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 3000);
        }

        // 添加分数显示
        const scoreEl = document.createElement('div');
        scoreEl.id = 'gameScore';
        scoreEl.style.position = 'fixed';
        scoreEl.style.top = '20px';
        scoreEl.style.left = '20px';
        scoreEl.style.color = '#fff';
        scoreEl.style.fontSize = '24px';
        scoreEl.style.fontWeight = 'bold';
        scoreEl.style.zIndex = '1000';
        scoreEl.style.textShadow = '0 0 10px #ff69b4';
        scoreEl.innerText = '击中烟花: 0';
        document.body.appendChild(scoreEl);

        class FallingItem {
            constructor() {
                this.x = Math.random() * (width - 40) + 20;
                this.y = -20;
                this.vy = Math.random() * 2 + 1; // 掉落速度
                this.radius = 15;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.isGathering = false; // 新增属性
                this.targetX = 0;
                this.targetY = 0;
            }
            
            update() {
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 画一个星星或者礼盒形状
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // 简单的星星
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.radius,
                               -Math.sin((18 + i * 72) * Math.PI / 180) * this.radius);
                    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.radius / 2),
                               -Math.sin((54 + i * 72) * Math.PI / 180) * (this.radius / 2));
                }
                ctx.closePath();
                ctx.fill();
                
                // 发光效果
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.stroke();
                
                ctx.restore();
            }
        }

        // 点击触发判定
        document.addEventListener('click', function(e) {
            let hit = false;
            // 检查是否点击到掉落物
            for (let i = fallingItems.length - 1; i >= 0; i--) {
                const item = fallingItems[i];
                const dx = e.clientX - item.x;
                const dy = e.clientY - item.y;
                const dist = Math.hypot(dx, dy);
                
                // 判定范围稍微大一点，方便点击
                if (dist < item.radius * 3) {
                    // 击中！
                    // 在该位置直接生成爆炸烟花
                    const type = Math.random() < 0.4 ? 'heart' : 'normal';
                    fireworks.push(new Firework(item.x, item.y, type, true));
                    
                    fallingItems.splice(i, 1);
                    hit = true;
                    addScore(1);
                    scoreEl.style.transform = "scale(1.2)";
                    setTimeout(() => scoreEl.style.transform = "scale(1)", 100);
                    break; // 一次只打一个
                }
            }
            
            // 如果没打中，发射一个普通的作为惩罚或装饰
            if (!hit) {
                 fireworks.push(new Firework(e.clientX, e.clientY));
            }
        });

        // 自动生成掉落物
        let itemInterval = setInterval(spawnItem, 200); // 提高基础频率到200ms

        function spawnItem() {
             // 统计当前非汇聚状态的掉落物数量
             const activeCount = fallingItems.filter(item => !item.isGathering).length;
             
             // 大幅提高上限：普通模式50个，自动锁定模式150个
             const limit = autoLockActive ? 150 : 50;
             const chance = autoLockActive ? 0.95 : 0.8;
             
             if (activeCount < limit && Math.random() < chance) {
                 fallingItems.push(new FallingItem());
             }
        }

        // ================= 技能逻辑 =================
        let autoLockActive = false;
        let autoLockTimer = null;

        function toggleAutoLock() {
             const btn = document.getElementById('autoLockBtn');
             
             if (autoLockActive) {
                 // 关闭锁定
                 autoLockActive = false;
                 btn.classList.remove('active');
                 btn.innerText = "🎯 自动锁定 (30s)";
                 if (autoLockTimer) clearTimeout(autoLockTimer);
                 
                 // 恢复正常生成速度
                 clearInterval(itemInterval);
                 itemInterval = setInterval(spawnItem, 200);
             } else {
                 // 开启锁定
                 autoLockActive = true;
                 btn.classList.add('active');
                 btn.innerText = "🛑 停止锁定";
                 
                 // 极速生成模式
                 clearInterval(itemInterval);
                 itemInterval = setInterval(spawnItem, 50); // 50ms极速生成
                 
                 autoLockTimer = setTimeout(() => {
                     if (autoLockActive) toggleAutoLock();
                 }, 30000);
             }
        }

        function gatherStarsToHeart() {
            // 生成星星汇聚爱心
            const count = 50;
            const centerX = width / 2;
            const centerY = height / 2;
            const scale = 12;

            for (let i = 0; i < count; i++) {
                const t = (Math.PI * 2 * i) / count;
                const dx = 16 * Math.pow(Math.sin(t), 3);
                const dy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                const tx = centerX + dx * scale;
                const ty = centerY - dy * scale;
                
                // 生成在屏幕外
                const item = new FallingItem();
                item.x = Math.random() * width;
                item.y = -50;
                item.vy = 0; // 暂时接管运动
                item.targetX = tx;
                item.targetY = ty;
                item.isGathering = true;
                
                fallingItems.push(item);
            }
        }

        function launchHeartShape() {
            // 在屏幕中心发射心形烟花阵列
            const centerX = width / 2;
            const centerY = height * 0.4;
            const count = 30; // 烟花数量
            
            for (let i = 0; i < count; i++) {
                // 均匀分布在0到2PI之间
                const t = (Math.PI * 2 * i) / count;
                // 心形公式
                const scale = 15; // 坐标缩放系数，决定心形大小
                // 注意坐标系变换：x = 16sin^3(t), y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
                // canvas y轴向下，这里需要把y取反以正立，或者直接用正值如果想倒心形
                // 我们希望正心形，原公式y向上为正。Canvas y向下为正。
                // 所以 canvasY = centerY - formulaY * scale
                const dx = 16 * Math.pow(Math.sin(t), 3);
                const dy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                const tx = centerX + dx * scale;
                const ty = centerY - dy * scale;
                
                // 延迟发射，形成绘制效果
                setTimeout(() => {
                    fireworks.push(new Firework(tx, ty, 'heart')); // 每一个都是爱心烟花
                }, i * 50);
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, width, height);
            
            // 绘制爱心粒子
            particles.forEach(p => { p.update(); p.draw(); });
            
            // 自动锁定逻辑
            if (autoLockActive) {
                // 每一帧尝试锁定一个目标
                if (fallingItems.length > 0 && Math.random() < 0.2) { // 稍微限制频率
                    const targetIndex = Math.floor(Math.random() * fallingItems.length);
                    const item = fallingItems[targetIndex];
                    
                    // 模拟击中
                    const type = Math.random() < 0.4 ? 'heart' : 'normal';
                    fireworks.push(new Firework(item.x, item.y, type, true));
                    fallingItems.splice(targetIndex, 1);
                    addScore(1);
                    
                    // 添加激光连线效果
                    ctx.beginPath();
                    ctx.moveTo(width/2, height);
                    ctx.lineTo(item.x, item.y);
                    ctx.strokeStyle = "rgba(255, 105, 180, 0.8)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            // 绘制掉落物
            
            // 绘制掉落物
            for (let i = fallingItems.length - 1; i >= 0; i--) {
                const item = fallingItems[i];
                
                if (item.isGathering) {
                    // 汇聚逻辑
                    item.x += (item.targetX - item.x) * 0.05;
                    item.y += (item.targetY - item.y) * 0.05;
                    item.rotation += 0.1;
                } else {
                    item.update();
                }
                
                item.draw();
                // 掉出屏幕移除 (非汇聚模式下)
                if (!item.isGathering && item.y > height + 50) {
                    fallingItems.splice(i, 1);
                }
            }

            // 绘制烟花
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const f = fireworks[i];
                f.update();
                f.draw();
                if (f.isDead()) {
                    fireworks.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
